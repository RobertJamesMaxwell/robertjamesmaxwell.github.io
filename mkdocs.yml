site_name: Robert Maxwell — System Design
site_description: Deep-dive system design case studies and architecture notes
site_url: https://robertjamesmaxwell.github.io

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Designs:
      - Inbound Update Integration Pipeline: designs/inbound-update-integration-pipeline.md
